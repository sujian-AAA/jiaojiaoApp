<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>娇娇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #6366F1;
        }
        
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .loading-text {
            color: white;
            font-size: 20px;
            font-weight: 600;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .loading-subtext {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-icon">💕</div>
        <div class="loading-text">娇娇</div>
        <div class="loading-subtext">娇娇的大学生活</div>
        <div class="spinner"></div>
    </div>
    
    <iframe id="app-frame" src="https://xyj.lifont.cn" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>
    
    <script>
        document.addEventListener('deviceready', function() {
            // 隐藏启动画面
            if (navigator.splashscreen) {
                setTimeout(function() {
                    navigator.splashscreen.hide();
                }, 1000);
            }
            
            // 设置状态栏颜色
            if (window.StatusBar) {
                StatusBar.backgroundColorByHexString('#6366F1');
                StatusBar.styleLightContent();
            }
        }, false);
        
        // 页面加载完成后隐藏loading
        var iframe = document.getElementById('app-frame');
        var loading = document.getElementById('loading');
        
        iframe.onload = function() {
            setTimeout(function() {
                loading.classList.add('hidden');
            }, 500);
        };
        
        // 如果3秒后还没加载完，也隐藏loading
        setTimeout(function() {
            loading.classList.add('hidden');
        }, 3000);
        
        // 处理返回键
        document.addEventListener('backbutton', function(e) {
            e.preventDefault();
            
            // 尝试让iframe返回
            try {
                if (iframe.contentWindow && iframe.contentWindow.history.length > 1) {
                    iframe.contentWindow.history.back();
                    return;
                }
            } catch(err) {
                // 跨域问题，忽略
            }
            
            // 确认退出
            if (confirm('确定要退出应用吗？')) {
                navigator.app.exitApp();
            }
        }, false);
    </script>
    
    <script type="text/javascript" src="cordova.js"></script>
</body>
</html>
