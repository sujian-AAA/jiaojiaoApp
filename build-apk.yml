name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install Capacitor dependencies
      run: |
        npm install -g @capacitor/cli
        npm install @capacitor/core @capacitor/android
    
    - name: Create Capacitor project
      run: |
        mkdir -p www
        cat > www/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
            <title>娇娇</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                html, body { width: 100%; height: 100%; overflow: hidden; background: #6366F1; }
                #app { width: 100%; height: 100%; border: none; }
                .loading {
                    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                    background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
                    display: flex; flex-direction: column; align-items: center; justify-content: center;
                    z-index: 9999; transition: opacity 0.5s;
                }
                .loading.hidden { opacity: 0; pointer-events: none; }
                .loading-icon { font-size: 80px; margin-bottom: 20px; }
                .loading-text { color: white; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
                .loading-subtext { color: rgba(255,255,255,0.7); font-size: 14px; }
            </style>
        </head>
        <body>
            <div class="loading" id="loading">
                <div class="loading-icon">💕</div>
                <div class="loading-text">娇娇</div>
                <div class="loading-subtext">娇娇的大学生活</div>
            </div>
            <iframe id="app" src="https://xyj.lifont.cn" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>
            <script>
                document.getElementById('app').onload = function() {
                    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
                };
                setTimeout(() => document.getElementById('loading').classList.add('hidden'), 3000);
            </script>
        </body>
        </html>
        EOF
    
    - name: Initialize Capacitor
      run: |
        npx cap init "娇娇" com.jiaojiao.app --web-dir www
    
    - name: Add Android platform
      run: |
        npm install @capacitor/android
        npx cap add android
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
    
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: 娇娇-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        tag_name: v1.0.0
        name: 娇娇 v1.0.0
        body: |
          娇娇的大学生活 Android应用
          
          应用信息：
          - 应用名称：娇娇
          - 包名：com.jiaojiao.app
          - 版本：1.0.0
          - 目标网址：https://xyj.lifont.cn
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
