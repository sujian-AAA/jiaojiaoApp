name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Install Cordova
        run: npm install -g cordova@11.1.0
      
      - name: Install dependencies
        working-directory: ./jiaojiao-cordova
        run: |
          rm -rf node_modules
          npm install
      
      - name: Remove existing platform
        working-directory: ./jiaojiao-cordova
        run: |
          cordova platform rm android 2>/dev/null || true
          rm -rf platforms/android
          rm -rf plugins
      
      - name: Add Android platform
        working-directory: ./jiaojiao-cordova
        run: |
          cordova platform add android@11.0.0
      
      - name: Build APK
        working-directory: ./jiaojiao-cordova
        run: |
          cordova build android
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 娇娇-APK
          path: jiaojiao-cordova/platforms/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
